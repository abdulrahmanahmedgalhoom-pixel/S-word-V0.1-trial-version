<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sword Editor</title>

    <!-- ملف CSS -->
    <link rel="stylesheet" href="sword.css">
</head>
<body>
 <div id="trmnil">

    <input 
    id="terminalInput"
    placeholder="Write command..."
    >

</div>
 <input
type="file"
id="imageInput"
accept="image/*"
style="display:none;"
>
<button id="searchMenuBtn">
    Search
</button>

<div id="searchMenu" class="search-menu">

    <input id="searchText" placeholder="Search">

    <input id="replaceText" placeholder="Replace">


    <button id="searchBtn">
        Search
    </button>


    <button id="replaceBtn">
        Replace
    </button>

</div>
<button id="darkModeBtn">
    Dark Mode
</button>
<button id="insertImageBtn">
    Insert Image
</button>

<button id="resizeImageBtn">
    Resize Image
</button>

<button id="deleteImageBtn">
    Delete Image
</button>
 <div class="menu">

    <button id="alignmentBtn">
        Alignment
    </button>

    <div id="alignmentMenu" class="menu-content">

        <button class="align-option" data-align="justifyRight">
            <i class="fa-solid fa-align-right"></i>
        </button>

        <button class="align-option" data-align="justifyCenter">
            <i class="fa-solid fa-align-center"></i>
        </button>

        <button class="align-option" data-align="justifyLeft">
            <i class="fa-solid fa-align-left"></i>
        </button>

        <button class="align-option" data-align="justifyFull">
            <i class="fa-solid fa-align-justify"></i>
        </button>

        <button id="alignment">
            Alignment
        </button>

        <button id="alignmentAll">
            Alignment All
        </button>

    </div>

</div>
 <div class="menu">

    <button id="fontBtn">Font</button>

    <div id="fontMenu" class="menu-content">
     <div class="highlight-box">

    <input type="color" id="highlightColor">

    <button id="highlightBtn">
        Highlight
    </button>
   <h5>To remove the highlight, use the white color.</h5>
    <div id="textcolormanu">
   <input type="color" id="textColor">
<button id="colorBtn">
    Text Color
</button>
     </div>
</div>
        <button id="boldBtn">
            <i class="fa-solid fa-bold"></i>
        </button>

        <button id="italicBtn">
            <i class="fa-solid fa-italic"></i>
        </button>

        <button id="underlineBtn">
            <i class="fa-solid fa-underline"></i>
        </button>
      <select id="fontSize">
    <option value="12">12</option>
    <option value="16">16</option>
    <option value="20">20</option>
    <option value="24">24</option>
    <option value="32">32</option>
    <option value="48">48</option>
</select>

<button id="refreshSize">Refresh Size</button>

<button id="refreshSizeAll">Refresh Size All</button>

<!-- ⬇️ إضافة: اختيار نوع الخط -->
<select id="fontFamily">
    <option value="Arial, sans-serif">Arial</option>
    <option value="'Times New Roman', serif">Times New Roman</option>
    <option value="'Courier New', monospace">Courier New</option>
    <option value="Georgia, serif">Georgia</option>
    <option value="Verdana, sans-serif">Verdana</option>
    <option value="Tahoma, sans-serif">Tahoma</option>
    <option value="'Comic Sans MS', cursive">Comic Sans MS</option>
    <option value="Impact, sans-serif">Impact</option>
</select>

<button id="applyFontBtn">Apply Font</button>
<button id="applyFontAllBtn">Apply Font All</button>
    </div>

</div>

<!-- ⬇️ إضافة: قائمة Font Word منفصلة (أزرار خطوط جاهزة) -->
<div class="menu">

    <button id="fontWordBtn">Font Word</button>

    <div id="fontWordMenu" class="menu-content">

        <!-- أزرار الخطوط بتتولّد تلقائيًا من FontWord.js -->

        <button id="fontAll">Font All</button>

        <button id="normalFont">Normal Font</button>

        <button id="normalFontAll">Normal Font All</button>

    </div>

</div>

 <button id="deleteBtn">Delete-all</button>
  <button id="saveBtn">Save</button>  
  <select id="exportType">
    <option value="txt">TXT</option>
    <option value="html">HTML</option>
    <option value="swd">SWD</option>
</select>
  <button id="newBtn">New</button>
  
  <button id="undoBtn" title="Undo">
    <i class="fa-solid fa-rotate-left"></i>
</button>

<button id="redoBtn" title="Redo">
    <i class="fa-solid fa-rotate-right"></i>
</button>
  <input type="file" id="fileInput" >
   
    <div class="editor-container">
        <div id="editor" contenteditable="true" data-placeholder="write in this"></div>
    </div>
 
    <!-- ملف JavaScript -->
 <script src="elements.js"></script>
<script src="Terminal.js"></script>
<script src="SaveAuto.js"></script>
<script src="Help.js"></script>
<script src="Theme.js"></script>
<script src="Search.js"></script>
<script src="Selection.js"></script>
<script src="Highlight.js"></script>
<script src="Commands.js"></script>
<script src="Font.js"></script>
<script src="FontWord.js"></script>
<script src="FontSize.js"></script>
<script src="Document.js"></script>
<script src="sword.js"></script>
<script src="Alignment.js"></script>
<script src="Export.js"></script>
<script src="openTheFile.js"></script>
<script src="extension-swd.js"></script>
<script src="ImageTools.js"></script>
</body>
</html>
